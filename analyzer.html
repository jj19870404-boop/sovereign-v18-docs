'use strict';

// ── V30 Strategy Parameters ──
const PARAMS = {
    rs_limit: 5000,
    tightness_max: 0.08,
    vol_min: 1.5,
    vol_max: 999.0,
    min_pct_52wk: 0.80,
    vol_zscore_min: 1.0,
    mom20_min: 0.0,
    sma_slope_min: 1.005,
    mom_filter: -0.065,
    tp_target: 0.08,
    atr_sl: 1.2,
    atr_sl_day1: 1.39,              // V30
    slippage: 0.001,
    max_loss: -0.20,
    breakeven_trigger: 0.008,
    trail_activation: 0.031,       // V29
    trail_distance: 0.031,
    day2_profit_lock: 0.012,
    day2_trail_distance: 0.008,     // V30 (was 0.010)
    time_stop: 7,                   // V30 (was 10)
    cand_gate: 70,
    skip_bear: true,
    skip_march: true,

// ── Helpers ──
function $(id) { return document.getElementById(id); }
function fmt(n, d) { return n == null || isNaN(n) ? '--' : Number(n).toFixed(d === undefined ? 2 : d); }
function pct(n, d) { return n == null || isNaN(n) ? '--' : Number(n).toFixed(d === undefined ? 1 : d) + '%'; }
function escHtml(s) { if (s == null) return ''; var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

function parseStock(arr) {
    var obj = {};
    for (var i = 0; i < KEYS.length; i++) {
        obj[FIELD_MAP[KEYS[i]]] = arr[i];
    }
    // Convert raw ratios to percentages for display consistency
    obj.pct_52wk_raw = obj.pct_52wk; // keep raw (0-1)
    obj.mom_5_raw = obj.mom_5;       // keep raw (decimal)
    obj.mom_20_raw = obj.mom_20;
    // Percentage versions
    obj.pct_52wk_pct = obj.pct_52wk != null ? obj.pct_52wk * 100 : null;
    obj.mom_5_pct = obj.mom_5 != null ? obj.mom_5 * 100 : null;
    obj.mom_20_pct = obj.mom_20 != null ? obj.mom_20 * 100 : null;
    obj.tightness_pct = obj.tightness != null ? obj.tightness * 100 : null;
    obj.close_position_pct = obj.close_position != null ? obj.close_position * 100 : null;
    return obj;
}

function gradeColor(g) {
    return { S:'#ffd700', A:'#4ecb71', B:'#8be9a0', C:'#ffd93d', D:'#ff9f43', F:'#ff6b6b' }[g] || '#8b90a5';

}
function barColor(pts, max) {
    var r = pts / max;

}

// ── 8 V30 Filters ──
function evaluateFilters(s) {
    var filters = [
        { name: '相對強度排名', key: 'RS Rank', value: '#' + (s.rs_rank || '?'), threshold: '<= ' + PARAMS.rs_limit, pass: s.rs_rank != null && s.rs_rank <= PARAMS.rs_limit },
        { name: '價格收縮度', key: 'Tightness', value: pct(s.tightness_pct, 2), threshold: '<= ' + (PARAMS.tightness_max * 100) + '%', pass: s.tightness != null && s.tightness <= PARAMS.tightness_max },
        { name: '量比', key: 'Vol Ratio', value: fmt(s.vol_ratio, 2) + 'x', threshold: '>= ' + PARAMS.vol_min + 'x', pass: s.vol_ratio != null && s.vol_ratio >= PARAMS.vol_min },
        { name: '52 週高點接近度', key: 'Pct 52wk', value: pct(s.pct_52wk_pct, 1), threshold: '>= ' + (PARAMS.min_pct_52wk * 100) + '%', pass: s.pct_52wk_raw != null && s.pct_52wk_raw >= PARAMS.min_pct_52wk },
        { name: '量能 Z 分數', key: 'Vol ZScore', value: fmt(s.vol_zscore, 2) + 'σ', threshold: '>= ' + PARAMS.vol_zscore_min + 'σ', pass: s.vol_zscore != null && s.vol_zscore >= PARAMS.vol_zscore_min },
        { name: '20 日動能', key: 'Mom 20', value: pct(s.mom_20_pct, 2), threshold: '>= ' + (PARAMS.mom20_min * 100) + '%', pass: s.mom_20_raw != null && s.mom_20_raw >= PARAMS.mom20_min },
        { name: 'SMA20 斜率', key: 'SMA Slope', value: fmt(s.sma20_slope, 4), threshold: '>= ' + PARAMS.sma_slope_min, pass: s.sma20_slope != null && s.sma20_slope >= PARAMS.sma_slope_min },
        { name: '5 日動能', key: 'Mom 5', value: pct(s.mom_5_pct, 2), threshold: '> ' + (PARAMS.mom_filter * 100) + '%', pass: s.mom_5_raw != null && s.mom_5_raw > PARAMS.mom_filter },
    ];
    return filters;
}

// ── Quality Assessment (mirrors Sovereign_V30.py assess_quality) ──
function assessQuality(s) {
    var vol = s.vol_ratio || 0;
    var pct52 = s.pct_52wk_pct || 0;
    var mom20 = s.mom_20_pct || 0;
    var mom5 = s.mom_5_pct || 0;
    var rs = s.rs_rank || 9999;
    var atr = s.atr || 0;
    var close = s.close || 1;
    var atr_pct = (atr / close) * 100;
    var prev_vol = s.vol_ratio_prev || 0;
    var rsi = s.rsi_14 || 0;

    var score = 0;
    var signals = [];
    var red_flags = [];

    // 1. Volume Ratio (20pts)
    if (vol === 0) {
        score += 0; signals.push(['量比', fmt(vol,1)+'x', 0, 20, '無量']);
    } else if (vol >= 1.7 && vol < 2.0) {
        score += 20; signals.push(['量比', fmt(vol,1)+'x', 20, 20, '1.7-2.0 最佳區間 (勝率83%)']);
    } else if (vol >= 1.5 && vol < 1.7) {
        score += 12; signals.push(['量比', fmt(vol,1)+'x', 12, 20, '溫和放量']);
    } else if (vol >= 2.0 && vol < 2.5) {
        score += 8; signals.push(['量比', fmt(vol,1)+'x', 8, 20, '偏高']);
    } else if (vol >= 2.5 && vol < 3.0) {
        score += 0; signals.push(['量比', fmt(vol,1)+'x', 0, 20, '危險: 2.5-3.0x 勝率僅36%']);
        red_flags.push('量比 2.5-3.0x (勝率36%)');
    } else if (vol >= 3.0 && vol < 5.0) {
        score += 5; signals.push(['量比', fmt(vol,1)+'x', 5, 20, '偏高但不確定']);
    } else {
        score += 2; signals.push(['量比', fmt(vol,1)+'x', 2, 20, '極端放量']);
        if (vol >= 5.0) red_flags.push('量比 ' + fmt(vol,1) + 'x 極端放量');
    }

    // 2. 52-week proximity (20pts)
    if (pct52 < 80) {
        score += 0; signals.push(['52周接近度', fmt(pct52,0)+'%', 0, 20, '低於 80% — 未達門檻']);
    } else if (pct52 >= 95 && pct52 < 100) {
        score += 20; signals.push(['52周接近度', fmt(pct52,0)+'%', 20, 20, '95-100% 最佳 (勝率84.6%)']);
    } else if (pct52 >= 100) {
        score += 10; signals.push(['52周接近度', fmt(pct52,0)+'%', 10, 20, '已在52周高點 (勝率65%)']);
    } else if (pct52 >= 85 && pct52 < 95) {
        score += 5; signals.push(['52周接近度', fmt(pct52,0)+'%', 5, 20, '85-95% 勝率約52%']);
    } else {
        score += 2; signals.push(['52周接近度', fmt(pct52,0)+'%', 2, 20, '危險: 80-85% 勝率僅47%']);
        red_flags.push('52周 ' + fmt(pct52,0) + '% (勝率47%)');
    }

    // 3. 20-day momentum (15pts)
    if (mom20 >= 10 && mom20 < 20) {
        score += 15; signals.push(['20日動能', (mom20>=0?'+':'')+fmt(mom20,1)+'%', 15, 15, '10-20% 最佳 (勝率78.6%)']);
    } else if (mom20 >= 5 && mom20 < 10) {
        score += 10; signals.push(['20日動能', (mom20>=0?'+':'')+fmt(mom20,1)+'%', 10, 15, '溫和動能']);
    } else if (mom20 >= 20 && mom20 < 30) {
        score += 8; signals.push(['20日動能', '+'+fmt(mom20,1)+'%', 8, 15, '偏強']);
    } else if (mom20 >= 30 && mom20 < 50) {
        score += 5; signals.push(['20日動能', '+'+fmt(mom20,1)+'%', 5, 15, '過熱中']);
    } else if (mom20 >= 50) {
        score += 2; signals.push(['20日動能', '+'+fmt(mom20,1)+'%', 2, 15, '嚴重過熱 >50%']);
        red_flags.push('20日動能 ' + fmt(mom20,0) + '% 嚴重過熱');
    } else if (mom20 >= 0 && mom20 < 5) {
        score += 6; signals.push(['20日動能', (mom20>=0?'+':'')+fmt(mom20,1)+'%', 6, 15, '0-5% 區間']);
    } else {
        score += 3; signals.push(['20日動能', fmt(mom20,1)+'%', 3, 15, '負動能 (<0%)']);
        red_flags.push('20日動能 ' + fmt(mom20,1) + '% 負動能');
    }

    // 4. 5-day momentum (15pts)
    if (mom5 >= 0 && mom5 < 5) {
        score += 15; signals.push(['5日動能', (mom5>=0?'+':'')+fmt(mom5,1)+'%', 15, 15, '0-5% 最佳 (勝率75%)']);
    } else if (mom5 >= -5 && mom5 < 0) {
        score += 10; signals.push(['5日動能', fmt(mom5,1)+'%', 10, 15, '小幅回撤']);
    } else if (mom5 >= 5 && mom5 < 10) {
        score += 10; signals.push(['5日動能', '+'+fmt(mom5,1)+'%', 10, 15, '溫和']);
    } else if (mom5 >= 10 && mom5 < 20) {
        score += 7; signals.push(['5日動能', '+'+fmt(mom5,1)+'%', 7, 15, '偏強']);
    } else if (mom5 >= 20) {
        score += 5; signals.push(['5日動能', '+'+fmt(mom5,1)+'%', 5, 15, '極度偏強']);
    } else {
        score += 2; signals.push(['5日動能', fmt(mom5,1)+'%', 2, 15, '危險: <-5% 勝率僅40%']);
        red_flags.push('5日動能 ' + fmt(mom5,1) + '% (勝率40%)');
    }

    // 5. RS Rank (15pts)
    if (rs >= 25 && rs <= 50) {
        score += 15; signals.push(['RS排名', '#'+rs, 15, 15, '25-50 最佳區間 (勝率80.3%)']);
    } else if (rs >= 11 && rs < 25) {
        score += 10; signals.push(['RS排名', '#'+rs, 10, 15, '強勢']);
    } else if (rs > 50 && rs <= 100) {
        score += 7; signals.push(['RS排名', '#'+rs, 7, 15, '中等']);
    } else if (rs >= 1 && rs < 11) {
        score += 5; signals.push(['RS排名', '#'+rs, 5, 15, '前10名 勝率59%']);
    } else {
        score += 3; signals.push(['RS排名', '#'+rs, 3, 15, 'RS偏弱']);
    }

    // 6. ATR/Price (10pts)
    if (atr_pct < 5) {
        score += 10; signals.push(['波動率', fmt(atr_pct,1)+'%', 10, 10, '<5% 低波動 (勝率72%)']);
    } else if (atr_pct < 7) {
        score += 6; signals.push(['波動率', fmt(atr_pct,1)+'%', 6, 10, '中等波動']);
    } else {
        score += 3; signals.push(['波動率', fmt(atr_pct,1)+'%', 3, 10, '高波動']);
    }

    // 7. Prev-day volume (5pts)
    if (prev_vol >= 0.5 && prev_vol < 1.0) {
        score += 5; signals.push(['前日量', fmt(prev_vol,1)+'x', 5, 5, '突破前安靜 (勝率74%)']);
    } else if (prev_vol < 0.5) {
        score += 2; signals.push(['前日量', fmt(prev_vol,1)+'x', 2, 5, '極度低量']);
    } else {
        score += 3; signals.push(['前日量', fmt(prev_vol,1)+'x', 3, 5, '前日活躍']);
    }

    // Extra red flags
    if (rs < 11 && pct52 < 95) red_flags.push('RS ' + rs + ' 過熱但未接近高點');
    if (pct52 >= 97 && rsi >= 65) red_flags.push('首日停損風險偏高 (52周 ' + fmt(pct52,0) + '% + RSI ' + fmt(rsi,0) + ')');
    else if (rsi >= 80) red_flags.push('RSI ' + fmt(rsi,0) + ' 超買 — 首日停損風險 21.4%');

    // Grade
    var p = score / 100 * 100;
    var grade, desc;
    if (p >= 80) { grade = 'A'; desc = '強勢突破訊號'; }
    else if (p >= 65) { grade = 'B'; desc = '品質良好'; }
    else if (p >= 50) { grade = 'C'; desc = '普通 - 謹慎操作'; }
    else if (p >= 35) { grade = 'D'; desc = '偏弱 - 建議觀望'; }
    else { grade = 'F'; desc = '假突破風險高 - 不建議進場'; }

    return { score: score, pct: p, grade: grade, desc: desc, signals: signals, red_flags: red_flags };
}

// ── Entry/TP/SL Calculation ──
function computeLevels(s) {
    var close = s.close;
    var atr = s.atr;
    if (!close || !atr) return null;
    var entry = close * (1 + PARAMS.slippage);
    var tp = entry * (1 + PARAMS.tp_target);
    var sl_day1 = entry - (atr * PARAMS.atr_sl_day1);
    var sl_day2 = entry - (atr * PARAMS.atr_sl);
    var max_loss_price = entry * (1 + PARAMS.max_loss);
    if (sl_day1 < max_loss_price) sl_day1 = max_loss_price;
    if (sl_day2 < max_loss_price) sl_day2 = max_loss_price;
    var risk_day1 = (entry - sl_day1) / entry * 100;
    var risk_day2 = (entry - sl_day2) / entry * 100;
    var reward = (tp - entry) / entry * 100;
    var rr_day1 = risk_day1 > 0.1 ? reward / risk_day1 : 0;
    var rr_day2 = risk_day2 > 0.1 ? reward / risk_day2 : 0;
    var be_price = entry * (1 + PARAMS.breakeven_trigger);
    var trail_price = entry * (1 + PARAMS.trail_activation);
    return {
        entry: entry, tp: tp,
        sl_day1: sl_day1, sl_day2: sl_day2,
        risk_day1: risk_day1, risk_day2: risk_day2,
        reward: reward, rr_day1: rr_day1, rr_day2: rr_day2,
        be_price: be_price, trail_price: trail_price
    };
}

    "EMA10": "EMA(10)", "SMA10": "SMA(10)", "EMA20": "EMA(20)", "SMA20": "SMA(20)",
    "EMA30": "EMA(30)", "SMA30": "SMA(30)", "EMA50": "EMA(50)", "SMA50": "SMA(50)",
    "EMA100": "EMA(100)", "SMA100": "SMA(100)", "EMA200": "EMA(200)", "SMA200": "SMA(200)",
    "Ichimoku": "一目均衡表", "VWMA": "VWMA(20)", "HullMA": "Hull MA(9)",
};

const CATEGORY_NAMES_ZH = {
    trend: "趨勢指標", momentum: "動能指標", volatility: "波動率指標",
    volume: "成交量指標", pattern: "K線型態", support_resistance: "支撐壓力",
    relative: "相對強弱", statistical: "統計指標", time_based: "時間序列",
};

function _deepFmtVal(v) {
    if (v == null) return '--';
    if (typeof v === 'boolean') return v ? 'Yes' : 'No';
    if (typeof v === 'string') return escHtml(v);
    if (typeof v === 'number') {
        if (Number.isInteger(v) && Math.abs(v) < 1e6) return String(v);
        return v.toFixed(2);
    }
    return String(v);
}

function _signalPill(sig) {
    if (sig === null || sig === undefined) return '';
    if (sig === 1) return '<span class="signal-pill pill-buy">Buy</span>';
    if (sig === -1) return '<span class="signal-pill pill-sell">Sell</span>';
    if (sig === 0) return '<span class="signal-pill pill-neutral">Neutral</span>';
    var s = String(sig).toLowerCase().replace(/\s+/g, '_');
    var map = {
        'strong_buy': ['Strong Buy', 'pill-strong-buy'],
        'buy': ['Buy', 'pill-buy'],
        'neutral': ['Neutral', 'pill-neutral'],
        'sell': ['Sell', 'pill-sell'],
        'strong_sell': ['Strong Sell', 'pill-strong-sell'],
        'bullish': ['Bullish', 'pill-buy'],
        'bearish': ['Bearish', 'pill-sell'],
        'rising': ['Rising', 'pill-buy'],
        'falling': ['Falling', 'pill-sell'],
        'high': ['High', 'pill-sell'],
        'low': ['Low', 'pill-buy'],
        'normal': ['Normal', 'pill-neutral'],
        'squeeze': ['Squeeze', 'pill-strong-buy'],
        'expansion': ['Expansion', 'pill-sell'],
        'reversal': ['Reversal', 'pill-strong-sell'],
        'near': ['Near', 'pill-neutral'],
        'far': ['Far', 'pill-neutral'],
        'near_ath': ['Near ATH', 'pill-buy'],
        'high_risk': ['High Risk', 'pill-sell'],
        'low_risk': ['Low Risk', 'pill-buy'],
        'strong': ['Strong', 'pill-buy'],
        'weak': ['Weak', 'pill-sell'],
        'support': ['Support', 'pill-buy'],
        'resistance': ['Resistance', 'pill-sell'],
        'none': ['—', 'pill-neutral'],
        'true': ['Yes', 'pill-buy'],
        'false': ['No', 'pill-neutral'],
    };
    var m = map[s];
    if (m) return '<span class="signal-pill ' + m[1] + '">' + m[0] + '</span>';
    return '<span class="signal-pill pill-neutral">' + escHtml(sig) + '</span>';
}

function _signalClass(sig) {
    if (!sig) return 'neutral';
    return String(sig).toLowerCase().replace(/\s+/g, '-');
}

function _gaugeHTML(title, rating) {
    if (!rating) return '';
    var sig = rating.signal || 'Neutral';
    var score = rating.score != null ? rating.score : 0;
    var gaugePct = ((score + 1) / 2 * 100).toFixed(1);
    var cls = _signalClass(sig);
    var buy = rating.buy || 0;
    var neutral = rating.neutral || 0;
    var sell = rating.sell || 0;
    return '<div class="tv-gauge">' +
        '<div class="gauge-title">' + escHtml(title) + '</div>' +
        '<div class="gauge-signal ' + cls + '">' + escHtml(sig) + '</div>' +
        '<div class="gauge-meter"><div class="gauge-marker" style="left:' + gaugePct + '%"></div></div>' +
        '<div class="gauge-counts"><span class="gc-buy">' + buy + ' Buy</span> / <span class="gc-neutral">' + neutral + ' Neutral</span> / <span class="gc-sell">' + sell + ' Sell</span></div>' +
        '</div>';
}

function _indicatorTableHTML(indicators) {
    if (!indicators || indicators.length === 0) return '';
    var rows = '';
    indicators.forEach(function(ind) {
        var name = INDICATOR_NAMES_ZH[ind.name] || INDICATOR_NAMES[ind.name] || ind.name;
        rows += '<tr>' +
            '<td>' + escHtml(name) + '</td>' +
            '<td style="text-align:right">' + _deepFmtVal(ind.value) + '</td>' +
            '<td>' + _signalPill(ind.signal) + '</td>' +
            '</tr>';
    });
    return '<table class="indicator-table">' +
        '<thead><tr><th>指標</th><th style="text-align:right">數值</th><th>訊號</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
        '</table>';
}

function _categoryHTML(key, catData) {
    var catName = CATEGORY_NAMES_ZH[key] || key;
    var entries = Object.entries(catData || {});
    if (entries.length === 0) return '';
    var rows = '';
    entries.forEach(function(e) {
        var indKey = e[0], indData = e[1];
        var name = INDICATOR_NAMES_ZH[indKey] || INDICATOR_NAMES[indKey] || indKey;
        var val = indData.value !== undefined ? indData.value : indData;
        var sig = indData.signal || indData.trend || null;
        rows += '<tr>' +
            '<td>' + escHtml(name) + '</td>' +
            '<td style="text-align:right">' + _deepFmtVal(val) + '</td>' +
            '<td>' + (sig ? _signalPill(sig) : '<span class="signal-pill pill-neutral">—</span>') + '</td>' +
            '</tr>';
    });
    return '<div class="indicator-category">' +
        '<div class="indicator-category-header">' +
        '<span>' + escHtml(catName) + ' <span class="cat-count">(' + entries.length + ')</span></span>' +
        '<span class="cat-arrow">&#9654;</span>' +
        '</div>' +
        '<div class="indicator-category-body">' +
        '<table class="indicator-table">' +
        '<thead><tr><th>指標</th><th style="text-align:right">數值</th><th>訊號</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
        '</table>' +
        '</div>' +
        '</div>';
}

async function renderDeep(sym) {
    var deepDiv = $('deep-content');
    var loading = $('deep-loading');
    deepDiv.innerHTML = '';
    loading.style.display = 'block';
    $('sec-deep').classList.add('visible');

    try {
        var resp = await fetch('data/deep/' + sym + '.json?t=' + Date.now());
        if (!resp.ok) {
            deepDiv.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-dim);">此股票暫無深度分析資料</div>';
            loading.style.display = 'none';
            return;
        }
        var da = await resp.json();
        loading.style.display = 'none';

        var html = '<div class="deep-section">';

        // TradingView Ratings
        var tv = da.tradingview_rating;
        if (tv) {
            html += '<h3>TradingView 技術評級</h3>';
            html += '<div class="tv-gauge-row">';
            html += _gaugeHTML('綜合評級', tv.summary);
            html += _gaugeHTML('振盪器', tv.oscillators);
            html += _gaugeHTML('移動平均', tv.moving_averages);
            html += '</div>';

            // Oscillators detail
            if (tv.oscillators && tv.oscillators.details) {
                var oscItems = Object.entries(tv.oscillators.details).map(function(e) { return {name:e[0], value:e[1].value, signal:e[1].signal}; });
                html += '<div class="indicator-category open">';
                html += '<div class="indicator-category-header"><span>振盪器 Oscillators <span class="cat-count">(' + oscItems.length + ')</span></span><span class="cat-arrow">&#9654;</span></div>';
                html += '<div class="indicator-category-body">' + _indicatorTableHTML(oscItems) + '</div></div>';
            }
            // MA detail
            if (tv.moving_averages && tv.moving_averages.details) {
                var maItems = Object.entries(tv.moving_averages.details).map(function(e) { return {name:e[0], value:e[1].value, signal:e[1].signal}; });
                html += '<div class="indicator-category open">';
                html += '<div class="indicator-category-header"><span>移動平均 Moving Averages <span class="cat-count">(' + maItems.length + ')</span></span><span class="cat-arrow">&#9654;</span></div>';
                html += '<div class="indicator-category-body">' + _indicatorTableHTML(maItems) + '</div></div>';
            }
        }

        // 9 category tables
        var categories = da.indicators;
        if (categories) {
            html += '<h3>擴展指標分析</h3>';
            var catOrder = ['trend','momentum','volatility','volume','pattern','support_resistance','relative','statistical','time_based'];
            catOrder.forEach(function(key) {
                if (categories[key]) {
                    html += _categoryHTML(key, categories[key]);
                }
            });
        }

        html += '</div>';
        deepDiv.innerHTML = html;

        // Attach collapse handlers
        deepDiv.querySelectorAll('.indicator-category-header').forEach(function(hdr) {
            hdr.addEventListener('click', function() {
                this.parentElement.classList.toggle('open');
            });
        });
    } catch(e) {
        loading.style.display = 'none';
        deepDiv.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-dim);">深度分析載入失敗: ' + escHtml(e.message) + '</div>';
    }
}

        '<span class="regime-detail">SPY $' + fmt(r.spy_close) + '</span>' +
        '<span class="regime-detail">MA50 $' + fmt(r.spy_ma50) + '</span>' +
        '<span class="regime-detail">MA200 $' + fmt(r.spy_ma200) + '</span>' +
        '<span class="regime-detail">RSI ' + fmt(r.spy_rsi, 1) + '</span>' +

function renderFilters(s, sym) {
    var filters = evaluateFilters(s);
    var passCount = filters.filter(function(f) { return f.pass; }).length;
    var allPass = passCount === filters.length;

    var html = '<table class="filter-table"><thead><tr><th>篩選條件</th><th>當前值</th><th>門檻</th><th>結果</th></tr></thead><tbody>';
    filters.forEach(function(f) {
        html += '<tr><td>' + escHtml(f.name) + '</td><td style="font-family:var(--font-mono)">' + escHtml(f.value) + '</td>' +
            '<td style="font-family:var(--font-mono);color:var(--text-dim)">' + escHtml(f.threshold) + '</td>' +
            '<td>' + (f.pass ? '<span class="badge-pass">PASS</span>' : '<span class="badge-fail">FAIL</span>') + '</td></tr>';
    });
    html += '</tbody></table>';
    html += '<div class="verdict ' + (allPass ? 'pass' : 'fail') + '">' +
        escHtml(sym) + (allPass ? ' 通過全部 ' + filters.length + ' 項 V30 篩選' : ' 未通過 V30 篩選 (' + passCount + '/' + filters.length + ')') +
        '</div>';

    $('filter-content').innerHTML = html;
    $('sec-filter').classList.add('visible');
}

function renderQuality(s) {
    var q = assessQuality(s);
    var html = '';

    // Signal bars
    q.signals.forEach(function(sig) {
        var name = sig[0], val = sig[1], pts = sig[2], max = sig[3], note = sig[4];
        html += '<div class="signal-row">' +
            '<span class="signal-label">' + escHtml(name) + '</span>' +
            '<span class="signal-value">' + escHtml(val) + '</span>' +
            '<div class="signal-bar-wrap"><div class="signal-bar" style="width:' + (pts/max*100) + '%;background:' + barColor(pts,max) + '"></div></div>' +
            '<span class="signal-pts">' + pts + '/' + max + '</span>' +
            '</div>' +
            '<div class="signal-note">' + escHtml(note) + '</div>';
    });

    // Grade display
    html += '<div class="grade-display">' +
        '<div class="grade-letter" style="color:' + gradeColor(q.grade) + '">' + q.grade + '</div>' +
        '<div class="grade-info"><div class="score" style="color:' + gradeColor(q.grade) + '">' + q.score + ' / 100 (' + fmt(q.pct, 0) + '%)</div>' +
        '<div class="desc">' + escHtml(q.desc) + '</div></div></div>';

    $('quality-content').innerHTML = html;
    $('sec-quality').classList.add('visible');
}

function hideResults() {
    ['sec-regime','sec-filter','sec-quality','sec-entry','sec-tech','sec-deep'].forEach(function(id) {
        $(id).classList.remove('visible');
    });
}

function showStatus(msg) {
    $('status-msg').textContent = msg;
    $('status-msg').style.display = 'block';
}

function analyze(sym) {
    hideResults();
    sym = sym.toUpperCase().trim();
    if (!sym) return;

    if (!DATA || !DATA.stocks) {
        showStatus('資料尚未載入，請稍候...');
        return;
    }

    var arr = DATA.stocks[sym];
    if (!arr) {
        showStatus(sym + ' 未在資料庫中 (可能不符合基本條件: 日成交量 > 50K, 股價 > $1)');
        return;
    }

    $('status-msg').style.display = 'none';
    var s = parseStock(arr);

    renderRegime();
    renderFilters(s, sym);
    renderQuality(s);
    renderEntry(s);
    renderTech(s);
    renderDeep(sym);

    // Scroll to regime section
    $('sec-regime').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Autocomplete ──
function setupAutocomplete() {
    var input = $('search-input');
    var list = $('ac-list');
    var activeIdx = -1;

    input.addEventListener('input', function() {
        var q = this.value.toUpperCase().trim();
        list.innerHTML = '';
        activeIdx = -1;
        if (q.length < 1) { list.style.display = 'none'; return; }
        var matches = ALL_SYMBOLS.filter(function(s) { return s.indexOf(q) === 0; }).slice(0, 8);
        if (matches.length === 0) { list.style.display = 'none'; return; }
        matches.forEach(function(m) {
            var div = document.createElement('div');
            div.textContent = m;
            div.setAttribute('role', 'option');
            div.addEventListener('mousedown', function(e) {
                e.preventDefault();
                input.value = m;
                list.style.display = 'none';
                analyze(m);
            });
            list.appendChild(div);
        });
        list.style.display = 'block';
    });

    input.addEventListener('keydown', function(e) {
        var items = list.querySelectorAll('div');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIdx = Math.min(activeIdx + 1, items.length - 1);
            items.forEach(function(el, i) { el.classList.toggle('active', i === activeIdx); });
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIdx = Math.max(activeIdx - 1, 0);
            items.forEach(function(el, i) { el.classList.toggle('active', i === activeIdx); });
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (activeIdx >= 0 && items[activeIdx]) {
                input.value = items[activeIdx].textContent;
                list.style.display = 'none';
                analyze(items[activeIdx].textContent);
            } else if (input.value.trim()) {
                list.style.display = 'none';
                analyze(input.value);
            }
        } else if (e.key === 'Escape') {
            list.style.display = 'none';
        }
    });

    input.addEventListener('blur', function() {
        setTimeout(function() { list.style.display = 'none'; }, 150);
    });
}

// ── Init ──
async function init() {
    setupAutocomplete();
    try {
        var resp = await fetch('data/analyzer.json?t=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        DATA = await resp.json();
        ALL_SYMBOLS = Object.keys(DATA.stocks).sort();
        showStatus('已載入 ' + ALL_SYMBOLS.length.toLocaleString() + ' 支股票資料 (' + DATA.date + ') — 輸入代碼開始分析');
        // Auto-focus search input
        $('search-input').focus();
    } catch(e) {
        showStatus('載入失敗: ' + e.message + ' — 請確認 data/analyzer.json 存在');
    }
    if (window.sovereignReveal) window.sovereignReveal();
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
